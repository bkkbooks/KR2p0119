body:
  text: 散見簡牘合輯青海大通縣上孫家寨一一五號漢墓木簡私卒僕養數草八從馬數使私卒卅六車首捕虜論草一言皆豫錢草九所毋為卅七材官虜以尺籍草二私車騎數卅十一軍吏六百以上兵車御右及把摩干鼓正鉞者拜爵賜論爵比士吏各二級爵毋過左庶長斬首捕虜拜爵各一級車斬捕首虜二級拜爵各一級斬捕五級拜爵各二級斬捕八級拜爵各三級不滿數賜錢級千斬首捕虜毋過人三級拜爵皆毋過五大夫必頗有主以驗不從法狀二級當一級以為五大夫者三級當一級首虜不滿數者藉須復戰軍罷不滿數賜錢級虜什二人以上拜爵各一級不滿二千級若校尉四百級以上及吏官屬不得戰者拜爵各一級爵毋過五大夫捕虜拜爵滿五大夫欲先罷者許之級拜爵各二級斬毋過人五級爵皆毋把摩可擊之能斬捕君長有邑人者及比二千石以上賜爵各四級其毋邑人及吏皆千石以下至六百石賜從軍斬首捕虜爵禪行至右更其士吏以上拜爵者皆禪行得至斬首捕虜者勿賜爵者賜爵虜者皆要斬約者軍吏賜爵三級也吏卒賜犯令者一人拜爵一級其官吏卒長五百將當百以下及同至二千石治所屬餘卒罷二千石此不能得者賜其令爵三級五軍以上賜爵卒斬首捕城戰斬首捕虜毋過七十人率斬首捕虜皆奪爵為士五毋爵捕十一級拜爵為捕令令曰伍人五百戶斬捕長以上食邑二百戶斬各六月都吏三凡為公乘者將卒吏二千石以上將軍吏私除私卒六百石至三百石率百石諸塞外蠻夷為外臣葆塞及不塞者外有急軍吏謹以辨道其不入葆及不居塹內與吏卒相佐者輒言二千將長及死不出營營私卒將吏皆耐為鬼新其為城旦能捕者虜完為城旦常令軍吏財將卒守無以城中城陷而自投常中者皆以為無人斬首若捕軍吏節功城功城克登戰陷功城能以其曲右以救之前解者以以約功戰皆救之解者屬所軍吏者將吏坐戰而騎材官斬捕其行尺籍籍書首頗不出而吏獨適人以前千人得勸戰為事及御右循行嚴劾不知法者將軍大後大將軍而騎凡七前曲前居中部前部前右部前曲前居中其前曲外後右部前曲次其後曲次後曲次之其後曲次其後曲次前後曲以次部後曲右部前曲而止其後曲前右部後曲後曲疾以中曲外後尉前右與居後曲後曲左右部後曲步而聞鼓音左部前曲左右官後遂皆左間客鼓音左部前曲左莫詩鼓止行者不當行而行斬將前復聞鼓音應鼓萩應金校尉聞應鼓翼適人來五疾以橫為兌武之法左部前曲步而前從為兌武為浮苴之法校從為囩之法左部以從為囩之法令成囩而止右部前曲右官相會於前左右相隨左右官前後部後曲各以官隨其前曲并隨行相隨校尉後隨尉居中校尉居其後曲為左翼右部前曲為右翼其後部後曲後鄉為後後鄉為後當前與解左睘入中其後曲解入間車皆伍一人掔馬人掔馬戟相各以其後隊右曲次相隨左右官并隧前左右官曲前與右官前隊角相正而各入後隊居七步隧間右步部司馬寨前曲毋動為前當左部前曲并右部司馬乃與前曲而前與校尉并與後曲右投足前曲曲前與其後曲左投左隧右投足塞右投足塞孔投足塞部前曲右投足當前行去校尉六十步而止右部後曲右投足前曲右投足曲左投足為左當前投足為右當之以將為指前曲為當其已右當前行曲左投足前與以前至當前陳為右當其而止陳定分隧陳却及前後次曲投前與左者縱以次救之解者後臧間右官鼓之右部前曲千人各正其曲成左右部左部前曲左官與前曲右部前曲馬次之右部曲前與校尉曲後士占曲并左前行方校右其右人校次兩校內校次之干校次之已校中央適人若與適人以前適者適人齊以前以衝之衝其心已得五五人曰伍後咸適曲曲成當其至左以馬其旗卒異其徽色別五百以旃上齒色別士吏以下旃下齒色別什以肩章別伍以肩左右別士以肩章尾色別左騎都尉翼青右騎都尉翼白左部司馬旃胡青前部司馬旃胡赤中部司馬旃胡黃右部司馬旃胡白後部司馬旃胡黑左什肩章青前什肩章赤中什肩章尾青從騎肩章肩章尾白肩章尾黑卒皆佩七策署縣爵里卒各十人一車車幡弩尺幡廣長半幅廣長三尺翼廣長翼乳寸半尾廣半幅長二尺二寸翼廣長與幡廣等兌本其廣長與幡廣等兌廣等兌本長以長司士曲旃干長五尺胡緣廣各曲旃長二丈三尺幡孫子曰夫十三篇相勝奈何孫子曰軍鬭令孫子曰能當三者制為軍鬭合戰令孫子曰戰貴其成以成不齊令孫子曰軍行患車之相令令曰令令子曰軍患陳不堅陳不堅則前破而制為堅陳為中堅堅干行五百將斬以曲干行候斬以部干行司馬斬以校干行軍尉斬干行伍長斬什干行軍尉斬之司斬以百執者斬能執之賞如甲首諸誅者皆劓之以別死罪罪能執之賞如甲行殺之擅退者後行殺之殺之擅有矢前有還顧目北者後行殺之如殺適人故以後禁前是故善者可與赴湯火白刃也寇者有右者右行曰諸吏無貴賤非其陳毋出陳過故善而前不得扶傷舉死民弓弩并弦約矢盡兵折非有將之方陳為將車為方為方牡陳衝方之衝方制為六曰馮車七以逢弓有方有方人與其其行為斬以者罰𢪛莤發而校不鬭除合與令在其地不法微土不擇卿去陳人以上書到皆駕若騎行以駕傳遣吏常將以將其左騎始左騎城郭能復如右游前後府已鬭將屯兵豫御御不得用數而破其其亡摩取薪柴兵約斬車一兩卌四定行者一人曰二人曰學之者
